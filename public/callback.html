<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub OAuth Callback</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
        sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    .container {
      text-align: center;
      padding: 40px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      max-width: 400px;
    }
    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #0366d6;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .message {
      color: #586069;
      font-size: 16px;
      margin: 10px 0;
    }
    .error {
      color: #cb2431;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <div class="message" id="message">Processing...</div>
  </div>

  <script>
    const messageEl = document.getElementById('message');

    function sendMessage(result, error = null) {
      const data = JSON.stringify({ result, error });
      if (window.opener) {
        window.opener.postMessage(data, window.location.origin);
      }
      // 延迟关闭窗口，确保消息已发送
      setTimeout(() => window.close(), 500);
    }

    function handleCallback() {
      const urlParams = new URLSearchParams(window.location.search);
      const code = urlParams.get('code');
      const error = urlParams.get('error');
      const state = urlParams.get('state');

      if (error) {
        messageEl.textContent = 'Authorization denied';
        messageEl.classList.add('error');
        sendMessage(null, error);
        return;
      }

      if (!code) {
        messageEl.textContent = 'No authorization code found';
        messageEl.classList.add('error');
        sendMessage(null, 'No code');
        return;
      }

      // 将 code 和 state 传递给父窗口，由父窗口处理获取 token
      messageEl.textContent = 'Redirecting...';
      sendMessage({ code, state });
    }

    // 页面加载完成后处理回调
    handleCallback();
  </script>
</body>
</html>
